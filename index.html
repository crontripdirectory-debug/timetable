    <style>
        /* (前と同じスタイルは省略していますが、そのまま使えます) */
        :root {
            --bg-color: #F9F8F7;
            --board-bg: #161a1d;
            --led-orange: #ff9d00;
            --led-green: #33ff33;
            --led-red: #ff3333;
            --text-gray: #000000;
        }
        body { background-color: var(--bg-color); color: #ffffff; font-family: 'DotGothic16', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #clock-container { font-family: 'Share Tech Mono', monospace; font-size: 1.8rem; color: var(--led-orange); text-shadow: 0 0 5px var(--led-orange); margin-bottom: 20px; background: #000; padding: 5px 15px; border-radius: 4px; border: 2px solid #333; }
        .board { background-color: var(--board-bg); border: 6px solid #2d3238; border-radius: 8px; width: 100%; max-width: 600px; padding: 10px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 25px; }
        .board-title { font-size: 1.2rem; padding-bottom: 8px; border-bottom: 2px solid #3d454d; margin-bottom: 10px; color: #fff; display: flex; justify-content: space-between; }
        .row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px dashed #2d3238; font-size: 1.2rem; height: 30px; }
        .col-time { width: 20%; font-family: 'Share Tech Mono', monospace; color: var(--led-orange); text-shadow: 0 0 4px var(--led-orange); font-size: 1.4rem; }
        .col-type { width: 30%; text-align: center; }
        .type-romance { color: var(--led-red); text-shadow: 0 0 4px var(--led-red); }
        .type-local { color: var(--led-green); text-shadow: 0 0 4px var(--led-green); }
        .col-dest { width: 30%; text-align: center; color: #ffffff; }
        .col-status { width: 20%; text-align: right; font-size: 0.9rem; }
        .status-soon { color: var(--led-red); animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .no-train { color: var(--text-gray); text-align: center; width: 100%; padding: 15px 0; font-style: italic; }

        /* 🆕 平日/休日切り替えボタンのスタイル */
        .btn-container {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .tab-btn {
            background-color: #2d3238;
            color: #ccc;
            border: 2px solid #4f5761;
            padding: 8px 20px;
            font-family: 'DotGothic16', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
        }
        .tab-btn.active {
            background-color: var(--led-orange);
            color: #000;
            font-weight: bold;
            border-color: #fff;
            box-shadow: 0 0 10px var(--led-orange);
        }
    </style>
</head>

        // 🆕 ボタンが押された時にモードを切り替える関数
        function changeMode(mode) {
            currentMode = mode;
            
            // ボタンの見た目（色）を変える
            document.getElementById('btn-weekday').classList.toggle('active', mode === 'weekday');
            document.getElementById('btn-weekend').classList.toggle('active', mode === 'weekend');
            
            // 掲示板の右上の文字を変える
            const statusText = mode === 'weekday' ? '平日表示中' : '土休日表示中';
            document.getElementById('board-status-gora').innerText = statusText;
            document.getElementById('board-status-odawara').innerText = statusText;

            // 表示を即座に更新
            updateBoards();
        }

        function updateBoards() {
            const now = new Date();
            const hrs = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            const secs = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${hrs}:${mins}:${secs}`;

            const currentTimeStr = `${hrs}:${mins}`;

            // 🆕 選択されているモードのデータを読み込むように修正
            renderDirection('gora', currentTimeStr, timetables[currentMode].gora);
            renderDirection('odawara', currentTimeStr, timetables[currentMode].odawara);
        }

        function renderDirection(direction, currentTimeStr, activeTimetable) {
            const container = document.getElementById(`${direction}-rows`);
            container.innerHTML = ''; 

            const upcomingTrains = activeTimetable.filter(train => train.time >= currentTimeStr);

            if (upcomingTrains.length === 0) {
                container.innerHTML = '<div class="no-train">本日の運転は終了しました</div>';
                return;
            }

            const displayCount = Math.min(upcomingTrains.length, 3);

            for (let i = 0; i < displayCount; i++) {
                const train = upcomingTrains[i];
                const row = document.createElement('div');
                row.className = 'row';

                const typeClass = train.type === 2 ? 'type-romance' : 'type-local';

                let statusText = 'ー';
                let statusClass = '';
                if (train.time === currentTimeStr) {
                    statusText = 'まもなく';
                    statusClass = 'status-soon';
                }

                row.innerHTML = `
                    <div class="col-time">${train.time}</div>
                    <div class="col-type ${typeClass}">${train.name}</div>
                    <div class="col-dest">${train.dest}</div>
                    <div class="col-status ${statusClass}">${statusText}</div>
                `;
                container.appendChild(row);
            }
        }

        setInterval(updateBoards, 1000);
        updateBoards();
    </script>
