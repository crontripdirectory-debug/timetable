<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>箱根湯本駅 時刻表（パステルスタイル）</title>

    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 🎨 パステルカラーのカラーパレット設定 */
            --bg-color: #f9f8f7;          /* 背景：ほんのりニュアンスのある白 */
            --text-color: #5a6370;        /* 文字：優しいアッシュグレー */
            --board-bg: #ffffff;          /* 掲示板背景：やわらかい白 */
            --board-border: #e8ecf0;      /* 掲示板の枠：ミルク色 */
            
            --pastel-orange: #ffb380;     /* 時刻：コーラルパステル */
            --pastel-red: #ff9aa2;        /* ロマンスカー：いちごミルク */
            --pastel-green: #b5ead7;      /* 各駅停車：ミントパステル */
            --pastel-blue: #a0c4ff;       /* 駅名など：ソーダパステル */
            
            --btn-bg: #eef2f5;            /* ボタン：淡いグレー */
            --btn-active: #ffdfba;        /* 選択中ボタン：アプリコット */
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color);
            font-family: 'M PLUS Rounded 1c', sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* 🔴 一番上の大きなタイトル */
        h1 {
            color: #ff9aa2 !important; /* パステルピンク */
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        /* 🔴 時計のデザインも優しく変更 */
        #clock-container { 
            font-family: 'Share Tech Mono', monospace; 
            font-size: 1.4rem; 
            color: #97a2b0; 
            margin-bottom: 25px; 
            background: #ffffff; 
            padding: 6px 20px; 
            border-radius: 20px; 
            border: 2px solid var(--board-border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        /* 🔴 掲示板を丸みのあるパステルな白いボックスに */
        .board { 
            background-color: var(--board-bg); 
            border: 3px solid var(--board-border); 
            border-radius: 24px; /* 👈 角をかなり丸くしました */
            width: 100%; 
            max-width: 500px; 
            padding: 20px; 
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.1); 
            margin-bottom: 25px; 
        }

        /* 掲示板の中のタイトル */
        .board-title { 
            font-size: 1.1rem; 
            font-weight: 700;
            padding-bottom: 12px; 
            border-bottom: 2px solid #f0f4f8; 
            margin-bottom: 10px; 
            color: #7b889b; 
            display: flex; 
            justify-content: space-between; 
        }

        /* 時刻表の1行 */
        .row { 
            display: flex; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px dashed #edf1f5; 
            font-size: 1.1rem; 
        }

        /* 各列の色とかたち */
        .col-time { 
            width: 20%; 
            font-family: 'Share Tech Mono', monospace; 
            color: #7b889b; 
            font-size: 1.3rem; 
            font-weight: bold;
        }
        
        .col-type { 
            width: 35%; 
            text-align: center; 
        }
        
        /* 🔴 種別をパステルの可愛いバッジ風に */
        .col-type span {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .type-romance span { 
            background-color: var(--pastel-red); 
            color: #ffffff; 
        }
        .type-local span { 
            background-color: var(--pastel-green); 
            color: #4f7a6b; 
        }

        .col-dest { 
            width: 25%; 
            text-align: center; 
            color: var(--text-color); 
            font-weight: bold;
        }

        .col-status { 
            width: 20%; 
            text-align: right; 
            font-size: 0.85rem; 
        }
        .status-soon { 
            color: #ffb380; 
            font-weight: bold;
            animation: blink 1.5s infinite; 
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        .no-train { 
            color: #a0aec0; 
            text-align: center; 
            width: 100%; 
            padding: 20px 0; 
            font-style: italic; 
        }

        /* 🔴 タブ切り替えボタンもぷっくりパステルに */
        .btn-container {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }
        .tab-btn {
            background-color: var(--btn-bg); 
            color: #718096; 
            border: none; 
            padding: 10px 24px; 
            font-family: 'M PLUS Rounded 1c', sans-serif; 
            font-size: 0.95rem; 
            font-weight: bold;
            cursor: pointer; 
            border-radius: 16px; 
            transition: transform 0.1s ease, background-color 0.2s ease;
        }
        .tab-btn:active {
            transform: scale(0.95);
        }
        .tab-btn.active {
            background-color: var(--btn-active);
            color: #c77d24;
            box-shadow: 0 4px 12px rgba(255, 223, 186, 0.5);
        }
    </style>
</head>

        function changeMode(mode) {
            currentMode = mode;
            document.getElementById('btn-weekday').classList.toggle('active', mode === 'weekday');
            document.getElementById('btn-weekend').classList.toggle('active', mode === 'weekend');
            
            const statusText = mode === 'weekday' ? '平日表示中' : '土休日表示中';
            document.getElementById('board-status-gora').innerText = statusText;
            document.getElementById('board-status-odawara').innerText = statusText;

            updateBoards();
        }

        function updateBoards() {
            const now = new Date();
            const hrs = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            const secs = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${hrs}:${mins}:${secs}`;

            const currentTimeStr = `${hrs}:${mins}`;

            renderDirection('gora', currentTimeStr, timetables[currentMode].gora);
            renderDirection('odawara', currentTimeStr, timetables[currentMode].odawara);
        }

        function renderDirection(direction, currentTimeStr, activeTimetable) {
            const container = document.getElementById(`${direction}-rows`);
            container.innerHTML = ''; 

            const upcomingTrains = activeTimetable.filter(train => train.time >= currentTimeStr);

            if (upcomingTrains.length === 0) {
                container.innerHTML = '<div class="no-train">本日の運転は終了しました</div>';
                return;
            }

            const displayCount = Math.min(upcomingTrains.length, 3);

            for (let i = 0; i < displayCount; i++) {
                const train = upcomingTrains[i];
                const row = document.createElement('div');
                row.className = 'row';

                const typeClass = train.type === 2 ? 'type-romance' : 'type-local';

                let statusText = '';
                let statusClass = '';
                if (train.time === currentTimeStr) {
                    statusText = 'まもなく';
                    statusClass = 'status-soon';
                }

                // 🔴 JavaScript側で、種別の文字を <span> で囲むように調整
                row.innerHTML = `
                    <div class="col-time">${train.time}</div>
                    <div class="col-type ${typeClass}"><span>${train.name}</span></div>
                    <div class="col-dest">${train.dest}</div>
                    <div class="col-status ${statusClass}">${statusText}</div>
                `;
                container.appendChild(row);
            }
        }

        setInterval(updateBoards, 1000);
        updateBoards();
    </script>
